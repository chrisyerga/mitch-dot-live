name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_CONVEX_URL: ${{ secrets.PUBLIC_CONVEX_URL }}
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.PUBLIC_POSTHOG_PROJECT_TOKEN }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            PUBLIC_CONVEX_URL=${{ secrets.PUBLIC_CONVEX_URL }}
            PUBLIC_POSTHOG_PROJECT_TOKEN=${{ secrets.PUBLIC_POSTHOG_PROJECT_TOKEN }}
            PUBLIC_POSTHOG_HOST=${{ secrets.PUBLIC_POSTHOG_HOST }}
          tags: |
            ghcr.io/chrisyerga/mitch-dot-live:${{ github.sha }}
            ghcr.io/chrisyerga/mitch-dot-live:latest

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PORCH_HOST || secrets.DO_HOST }}
          username: ${{ secrets.PORCH_USER || secrets.DO_USER }}
          key: ${{ secrets.PORCH_SSH_KEY || secrets.DO_SSH_KEY }}
          script: |
            bash -lc '
              set -e
              [ -f "$HOME/.bashrc" ] && PS1=porch-ci . "$HOME/.bashrc"
              set -u

              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              : "${DIGITALOCEAN_TOKEN:?DIGITALOCEAN_TOKEN must be available to Porch}"

              npx --yes @lindale/porch service register \
                --service-id mitch \
                --domain ismitchmcconnella.live ismitchmcconnell.live mitchmcconnell.live \
                --container mitch-web \
                --port 80 \
                --www-redirect \
                --image ghcr.io/chrisyerga/mitch-dot-live:${{ github.sha }} \
                --deploy-path /opt/mitch \
                --json

              cd /opt/porch
              docker compose restart caddy
            '

  convex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx convex deploy --yes
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
